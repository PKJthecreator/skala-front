<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="container">

    <h2>👤 회원가입</h2>
    <p>SKALA-FRONT 회원가입을 환영합니다.</p>
    <hr>

    <form action="signUpResult.html" method="get" onsubmit="return validateForm()">
        
        <fieldset>
            <legend>계정 정보</legend>
            <p>
                <label for="userId">아이디 (영문, 숫자, 특수문자 조합 4~15자): </label>
                <input type="text" id="userId" name="userId" minlength="4" maxlength="15" required placeholder="4~15자 영문/숫자 + 특수문자">
                <span id="idMsg" class="validation-msg"></span>
                <small>(필수)</small>
            </p>
            <p>
                <label for="userPw">비밀번호: </label>
                <input type="password" id="userPw" name="userPw" minlength="8" required placeholder="8자 이상 입력">
                <small>(필수)</small>
            </p>

            <!-- 1. 비밀번호 확인 기능 추가 -->
            <p>
                <label for="userPwConfirm">비밀번호 확인: </label>
                <input type="password" id="userPwConfirm" name="userPwConfirm" minlength="8" required placeholder="비밀번호 재입력">
                <small>(필수)</small>
            </p>

            <p>
                <label for="userEmail">이메일: </label>
                <input type="text" id="userEmail" name="userEmail" placeholder="example">
                @
                <select name="emailDomain">
                    <option value="direct">직접 입력</option>
                    <option value="naver.com">naver.com</option>
                    <option value="gmail.com">gmail.com</option>
                    <option value="daum.net">daum.net</option>
                </select>
            </p>
        </fieldset>

        <br>

        <fieldset>
            <legend>개인 프로필 정보</legend>
            <p>
                <label for="userName">이름: </label>
                <input type="text" id="userName" name="userName" required>
            </p>
            <p>
                <label for="userBirth">생년월일: </label>
                <input type="date" id="userBirth" name="userBirth">
            </p>
            <p>
                성별: 
                <label><input type="radio" name="gender" value="male" checked> 남성</label>
                <label><input type="radio" name="gender" value="female"> 여성</label>
                <label><input type="radio" name="gender" value="none"> 선택안함</label>
            </p>

            <!-- 3. 관심 분야(도메인) 옵션 확장 -->
            <p>
                관심 분야 (중복 선택 가능): <br>
                <label><input type="checkbox" name="interest" value="frontend"> 웹 프론트엔드 (Vue.js/HTML)</label><br>
                <label><input type="checkbox" name="interest" value="uiux"> UI/UX 디자인 표준</label><br>
                <label><input type="checkbox" name="interest" value="backend"> 백엔드 & 데이터베이스</label><br>
                <label><input type="checkbox" name="interest" value="devops"> 클라우드 & 인프라</label><br>
                <label><input type="checkbox" name="interest" value="ai"> AI 및 머신러닝 활용</label><br>
                <label><input type="checkbox" name="interest" value="sdv"> SDV (소프트웨어 정의 차량) 및 임베디드</label><br>
                <label><input type="checkbox" name="interest" value="algorithm"> 알고리즘 및 코딩 테스트 (Python 등)</label>
            </p>
            
            <p>
                <label for="joinPath">가입 경로: </label>
                <select id="joinPath" name="joinPath">
                    <option value="" disabled selected>-- 선택해 주세요 --</option>
                    <option value="search">인터넷 검색</option>
                    <option value="friend">지인 추천</option>
                    <option value="sns">SNS 광고</option>
                    <option value="etc">기타</option>
                </select>
            </p>
        </fieldset>

        <br>

        <fieldset>
            <legend>자기소개</legend>
            <p>
                <label for="intro">나를 표현하는 한 줄 소개 또는 가입 인사:</label><br>
                <textarea id="intro" name="intro" rows="5" cols="50" placeholder="여기에 내용을 입력하세요 (최대 200자)"></textarea>
            </p>
        </fieldset>

        <br>

        <!-- 2. 약관 동의 체크박스 추가 -->
        <fieldset>
            <legend>이용약관 동의</legend>
            <p>
                <label>
                    <input type="checkbox" name="agreeTerms" required> 
                    (필수) 서비스 이용약관 및 개인정보 처리방침에 동의합니다.
                </label>
            </p>
        </fieldset>

        <br>

        <input type="submit" class="btn-submit" value="동의하고 회원가입">
        <input type="reset" class="btn-reset" value="다시 작성">

    </form>

    </div>
    
    <script>
        function validateForm() {
            const userId = document.getElementById('userId').value;
            const idRegex = /^(?=.*[a-zA-Z])(?=.*[0-9])(?=.*[!@#$%^&*]).{4,15}$/;
            if (!idRegex.test(userId)) {
                alert("아이디는 영문, 숫자, 특수문자를 포함한 4~15자여야 합니다.");
                return false;
            }

            // 추가된 비밀번호 확인 로직
            const userPw = document.getElementById('userPw').value;
            const userPwConfirm = document.getElementById('userPwConfirm').value;
            
            if (userPw !== userPwConfirm) {
                alert("입력하신 비밀번호가 일치하지 않습니다.");
                return false; // 제출 중단
            }

            return true;
        }
    </script>
</body>
</html>
